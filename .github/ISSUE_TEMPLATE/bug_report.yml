name: Bug report
description: Something is broken or behaving incorrectly.
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which part of the monorepo does this affect?
      options:
        - services/petdata
        - services/retriever
        - apps/stacker
        - docs / repo-level
        - not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Node version, branch or commit, anything relevant.
    validations:
      required: false
