# Local development: application database for the Retriever service.
#
# Topology (see docs/local-development.md):
#   - Supabase CLI provides auth (GoTrue) on 54321: `supabase start` from this dir.
#   - This compose provides the app database: pgvector Postgres on host 5433.
#   - Retriever and stacker run natively (uvicorn / vite), not in compose.
#
# Usage:
#   docker compose up -d        # start the app database
#   docker compose down         # stop it (data persists in the named volume)
#   docker compose down -v      # stop and wipe data
#
# 5433 (not 5432) avoids colliding with a host Postgres or Supabase's bundled DB.

services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retriever
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retriever"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
